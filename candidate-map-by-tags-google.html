<style>
  :root{
    --bg:#EEF0F2;
    --panel:#FFFFFF;
    --panel-border:#D8DCE2;
    --accent:#3E4C63;
    --accent-dim:#8A93A3;
    --text:#20242C;
    --text-dim:#6B7280;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);}
  #app{display:flex;flex-direction:column;height:100vh;}

  header{
    padding:22px 28px 18px;
    border-bottom:1px solid var(--panel-border);
    display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap;
    background:#FFFFFF;
  }
  .title-block h1{
    font-family:'Fraunces',serif; font-weight:600; font-size:26px; letter-spacing:0.2px; margin:0;
    color:var(--text);
  }
  .title-block .eyebrow{
    text-transform:uppercase; letter-spacing:2.2px; font-size:11px; color:var(--accent); font-weight:600; margin-bottom:6px;
  }
  .stats{ display:flex; gap:26px; }
  .stat{ text-align:right; }
  .stat .num{ font-family:'Fraunces',serif; font-size:22px; color:var(--accent); font-weight:600; line-height:1;}
  .stat .lbl{ font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.4px; margin-top:4px;}

  #map{ flex:1; background:var(--bg); }

  .legend{
    position:absolute; bottom:22px; left:22px; z-index:5;
    background:var(--panel); border:1px solid var(--panel-border); border-radius:10px;
    padding:12px 14px; font-size:11.5px; color:var(--text-dim); max-width:230px;
    box-shadow:0 8px 24px rgba(0,0,0,.15);
  }
  .legend .row{ display:flex; align-items:center; gap:8px; margin-top:6px; }
  .legend .row:first-child{ margin-top:0; }
  .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .dot.city{ background:var(--accent);}
  .dot.approx{ background:var(--accent-dim);}

  .filterbar{
    position:absolute; top:14px; right:14px; z-index:5;
    background:var(--panel); border:1px solid var(--panel-border); border-radius:10px;
    padding:12px 14px; font-size:11.5px; color:var(--text-dim); max-width:210px;
    box-shadow:0 8px 24px rgba(0,0,0,.15);
  }
  .filterbar .flabel{ text-transform:uppercase; letter-spacing:1.2px; font-size:10px; color:var(--accent); font-weight:600; margin-bottom:8px;}
  .filterbar select{
    width:100%; background:#FFFFFF; color:#000000; border:1px solid var(--panel-border); border-radius:6px;
    padding:6px 8px; font-family:'Inter',sans-serif; font-size:12px;
  }

  .continent-label{
    font-family:'Fraunces',serif; font-weight:600; font-size:14px; letter-spacing:3px;
    text-transform:uppercase; color:#A8AEB8; opacity:.8; white-space:nowrap;
    pointer-events:none; text-shadow:0 1px 0 #fff, 0 -1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff;
    position:absolute; transform:translate(-50%,-50%);
  }

  .pop-name{ font-family:'Fraunces',serif; font-size:16px; font-weight:600; color:var(--accent); margin-bottom:6px;}
  .pop-tags{ display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
  .pill{
    font-size:10.5px; padding:3px 8px; border-radius:20px; background:rgba(62,76,99,0.10);
    border:1px solid rgba(62,76,99,0.30); color:var(--accent); white-space:nowrap;
  }
  .pill.region{ background:rgba(107,114,128,0.10); border-color:rgba(107,114,128,0.28); color:var(--text-dim);}
  .pop-loc{ font-size:12px; color:var(--accent-dim); border-top:1px solid var(--panel-border); padding-top:7px; margin-top:2px;
    display:flex; align-items:center; gap:5px;}
  .approx-tag{ font-size:10px; color:var(--text-dim); margin-left:4px; }
</style>
</head>

<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
<script>
  const DATA = JSON.parse(document.getElementById('data').textContent);
  const TOTAL_RECORDS = 1854;

  document.getElementById('statPlotted').textContent = DATA.length.toLocaleString();
  document.getElementById('statTotal').textContent = TOTAL_RECORDS.toLocaleString();
  const countries = new Set(DATA.map(d => d.location.split(',').pop().trim()).filter(Boolean));
  document.getElementById('statCountries').textContent = countries.size;

  const tagCounts = {};
  DATA.forEach(d => (d.other_tags || []).forEach(t => { tagCounts[t] = (tagCounts[t]||0)+1; }));
  const sortedTags = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]);
  const sel = document.getElementById('tagFilter');
  sortedTags.forEach(([t,c]) => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = `${t} (${c})`;
    sel.appendChild(opt);
  });

  function escapeHtml(s){
    if(!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  const MAP_STYLE = [
    { elementType: "geometry", stylers: [{ color: "#EEF0F2" }] },
    { elementType: "labels.text.fill", stylers: [{ color: "#6B7280" }] },
    { elementType: "labels.text.stroke", stylers: [{ color: "#FFFFFF" }, { weight: 3 }] },
    { featureType: "water", elementType: "geometry", stylers: [{ color: "#D6DEE8" }] },
    { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#8A93A3" }] },
    { featureType: "landscape", elementType: "geometry", stylers: [{ color: "#F2F3F5" }] },
    { featureType: "administrative.country", elementType: "geometry.stroke", stylers: [{ color: "#9CA3AF" }, { weight: 1 }] },
    { featureType: "administrative.country", elementType: "labels.text.fill", stylers: [{ color: "#5B6472" }] },
    { featureType: "administrative.province", elementType: "geometry.stroke", stylers: [{ color: "#B7BDC7" }, { weight: 1 }] },
    { featureType: "administrative.province", elementType: "labels.text.fill", stylers: [{ color: "#7C8494" }] },
    { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#7C8494" }] },
    { featureType: "poi", stylers: [{ visibility: "off" }] },
    { featureType: "transit", stylers: [{ visibility: "off" }] },
    { featureType: "road", elementType: "labels", stylers: [{ visibility: "off" }] },
    { featureType: "road", elementType: "geometry", stylers: [{ color: "#E4E6EA" }] },
    { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#DADDE3" }] }
  ];

  let map, clusterer, infoWindow, allMarkers = [];

  function buildMarker(d){
    const isExact = d.precision === 'city';
    const marker = new google.maps.Marker({
      position: { lat: d.jlat, lng: d.jlon },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 6,
        fillColor: isExact ? '#3E4C63' : '#8A93A3',
        fillOpacity: 1,
        strokeColor: '#FFFFFF',
        strokeWeight: 2
      }
    });
    marker.addListener('click', () => {
      const approx = !isExact ? `<span class="approx-tag">(${d.precision} approx.)</span>` : '';
      const tagPills = (d.other_tags||[]).map(t => `<span class="pill">${escapeHtml(t)}</span>`).join('');
      const regionPill = d.region ? `<span class="pill region">${escapeHtml(d.region)}</span>` : '';
      infoWindow.setContent(`
        <div class="pop-name">${escapeHtml(d.name)}</div>
        <div class="pop-tags">${regionPill}${tagPills}</div>
        <div class="pop-loc">📍 ${escapeHtml(d.location)} ${approx}</div>
      `);
      infoWindow.open(map, marker);
    });
    marker.__data = d;
    return marker;
  }

  function renderMarkers(filterTag){
    if(clusterer) clusterer.clearMarkers();
    const subset = filterTag ? allMarkers.filter(m => (m.__data.other_tags||[]).includes(filterTag)) : allMarkers;
    clusterer.addMarkers(subset);
    document.getElementById('statPlotted').textContent = subset.length.toLocaleString();
  }

  function initMap(){
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 20, lng: 10 },
      zoom: 2,
      minZoom: 2,
      styles: MAP_STYLE,
      disableDefaultUI: false,
      fullscreenControl: false,
      streetViewControl: false,
      mapTypeControl: false
    });

    infoWindow = new google.maps.InfoWindow();
    allMarkers = DATA.map(buildMarker);

    clusterer = new markerClusterer.MarkerClusterer({
      map, markers: [],
      renderer: {
        render: ({ count, position }) => new google.maps.Marker({
          position,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 14 + Math.min(count, 60) / 6,
            fillColor: '#3E4C63',
            fillOpacity: 0.85,
            strokeColor: '#FFFFFF',
            strokeWeight: 2
          },
          label: { text: String(count), color: '#FFFFFF', fontSize: '11px', fontWeight: '700', fontFamily: "'Inter',sans-serif" },
          zIndex: 1000 + count
        })
      }
    });
    renderMarkers('');
    sel.addEventListener('change', () => renderMarkers(sel.value));

    const CONTINENTS = [
      { name: 'North America', lat: 48, lng: -100 },
      { name: 'South America', lat: -16, lng: -60 },
      { name: 'Europe', lat: 51, lng: 20 },
      { name: 'Africa', lat: 4, lng: 20 },
      { name: 'Asia', lat: 42, lng: 92 },
      { name: 'Oceania', lat: -24, lng: 138 }
    ];
    class LabelOverlay extends google.maps.OverlayView {
      constructor(items){ super(); this.items = items; this.divs = []; }
      onAdd(){
        this.items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'continent-label';
          div.textContent = item.name;
          this.getPanes().overlayLayer.appendChild(div);
          this.divs.push({ div, latLng: new google.maps.LatLng(item.lat, item.lng) });
        });
      }
      draw(){
        const proj = this.getProjection();
        this.divs.forEach(({div, latLng}) => {
          const pos = proj.fromLatLngToDivPixel(latLng);
          div.style.left = pos.x + 'px';
          div.style.top = pos.y + 'px';
        });
      }
      onRemove(){ this.divs.forEach(({div}) => div.remove()); this.divs = []; }
    }
    new LabelOverlay(CONTINENTS).setMap(map);
  }

  window.initMap = initMap;
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDvD6LQ_Tar11Vp2ToSXb42yi3EmLFF2w4&callback=initMap&loading=async" async defer></script>
