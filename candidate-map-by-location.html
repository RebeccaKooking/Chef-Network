<style>
  :root{
    --bg:#EEF0F2;
    --panel:#FFFFFF;
    --panel-border:#D8DCE2;
    --accent:#3E4C63;
    --accent-dim:#8A93A3;
    --text:#20242C;
    --text-dim:#6B7280;
    --pin-shadow: 0 2px 5px rgba(32,36,44,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);}
  #app{display:flex;flex-direction:column;height:100vh;}

  header{
    padding:22px 28px 18px;
    border-bottom:1px solid var(--panel-border);
    display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap;
    background:#FFFFFF;
  }
  .title-block h1{
    font-family:'Fraunces',serif; font-weight:600; font-size:26px; letter-spacing:0.2px; margin:0;
    color:var(--text);
  }
  .title-block .eyebrow{
    text-transform:uppercase; letter-spacing:2.2px; font-size:11px; color:var(--accent); font-weight:600; margin-bottom:6px;
  }
  .stats{ display:flex; gap:26px; }
  .stat{ text-align:right; }
  .stat .num{ font-family:'Fraunces',serif; font-size:22px; color:var(--accent); font-weight:600; line-height:1;}
  .stat .lbl{ font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.4px; margin-top:4px;}

  #map{ flex:1; background:var(--bg); }

  .leaflet-popup-content-wrapper{
    background:var(--panel); color:var(--text); border-radius:8px; border:1px solid var(--panel-border);
    box-shadow:0 12px 32px rgba(0,0,0,.5);
  }
  .leaflet-popup-tip{ background:var(--panel); }
  .leaflet-popup-content{ margin:14px 16px; font-family:'Inter',sans-serif; min-width:200px;}
  .pop-name{ font-family:'Fraunces',serif; font-size:17px; font-weight:600; color:var(--accent); margin-bottom:2px;}
  .pop-company{ font-size:12px; color:var(--text-dim); margin-bottom:8px; font-style:italic;}
  .pop-tags{ display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; margin-bottom:8px; }
  .pill{
    font-size:10.5px; padding:3px 8px; border-radius:20px; background:rgba(62,76,99,0.10);
    border:1px solid rgba(62,76,99,0.30); color:var(--accent); white-space:nowrap;
  }
  .pop-loc{ font-size:12px; color:var(--accent-dim); border-top:1px solid var(--panel-border); padding-top:7px; margin-top:2px;
    display:flex; align-items:center; gap:5px;}
  .approx-tag{ font-size:10px; color:var(--text-dim); margin-left:4px; }

  .marker-pin{
    width:12px; height:12px; border-radius:50%;
    background:var(--accent); border:2px solid #FFFFFF; box-shadow:var(--pin-shadow);
  }
  .marker-pin.state-precision, .marker-pin.country-precision{
    background:var(--accent-dim); opacity:.9;
  }
  .continent-label{
    font-family:'Fraunces',serif; font-weight:600; font-size:15px; letter-spacing:3px;
    text-transform:uppercase; color:#A8AEB8; opacity:.75; white-space:nowrap;
    pointer-events:none; text-shadow:0 1px 0 #fff, 0 -1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff;
  }
  .state-label{
    font-family:'Inter',sans-serif; font-weight:600; font-size:9.5px; letter-spacing:0.3px;
    color:#7C8494; opacity:.85; white-space:nowrap; pointer-events:none;
    text-shadow:0 1px 0 #fff, 0 -1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff;
  }
  .country-label{
    font-family:'Inter',sans-serif; font-weight:600; font-size:10.5px; letter-spacing:0.4px;
    color:#5B6472; opacity:.8; white-space:nowrap; pointer-events:none;
    text-shadow:0 1px 0 #fff, 0 -1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff;
  }

  .legend{
    position:absolute; bottom:22px; left:22px; z-index:500;
    background:var(--panel); border:1px solid var(--panel-border); border-radius:10px;
    padding:12px 14px; font-size:11.5px; color:var(--text-dim); max-width:230px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  .legend .row{ display:flex; align-items:center; gap:8px; margin-top:6px; }
  .legend .row:first-child{ margin-top:0; }
  .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .dot.city{ background:var(--accent);}
  .dot.approx{ background:var(--accent-dim);}

  .leaflet-control-zoom a{ background:var(--panel) !important; color:var(--text) !important; border-color:var(--panel-border) !important;}
  .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large{
    background:rgba(62,76,99,0.16);
  }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div{
    background:var(--accent); color:#FFFFFF; font-family:'Inter',sans-serif; font-weight:700;
  }
</style>
</head>

<script>
  const DATA = JSON.parse(document.getElementById('data').textContent);
  const STATES_GEOJSON = JSON.parse(document.getElementById('states-data').textContent);
  const COUNTRIES_GEOJSON = JSON.parse(document.getElementById('countries-data').textContent);
  const TOTAL_RECORDS = 1854;

  document.getElementById('statPlotted').textContent = DATA.length.toLocaleString();
  document.getElementById('statTotal').textContent = TOTAL_RECORDS.toLocaleString();
  const countries = new Set(DATA.map(d => d.location.split(',').pop().trim()));
  document.getElementById('statCountries').textContent = countries.size;

  const map = L.map('map', { zoomControl: true, worldCopyJump: true }).setView([20, 10], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);

  // --- Approximate polygon centroid (average of largest ring's vertices) ---
  function ringCentroid(ring){
    let x=0,y=0;
    ring.forEach(p=>{x+=p[0];y+=p[1];});
    return [x/ring.length, y/ring.length];
  }
  function featureCentroid(feature){
    const g = feature.geometry;
    if(g.type === 'Polygon'){
      return ringCentroid(g.coordinates[0]);
    } else if(g.type === 'MultiPolygon'){
      let best = g.coordinates[0][0], bestLen = best.length;
      g.coordinates.forEach(poly=>{ if(poly[0].length > bestLen){ best = poly[0]; bestLen = poly[0].length; } });
      return ringCentroid(best);
    }
    return [0,0];
  }

  const labelPane = map.createPane('labelPane');
  labelPane.style.zIndex = 450;
  labelPane.style.pointerEvents = 'none';

  const topLabelsPane = map.createPane('topLabelsPane');
  topLabelsPane.style.zIndex = 650;

  // --- Country borders (visible outline) ---
  L.geoJSON(COUNTRIES_GEOJSON, {
    style: { color:'#9CA3AF', weight:1, fillOpacity:0, opacity:0.85 },
    interactive: false
  }).addTo(map);

  // --- US state borders + labels ---
  L.geoJSON(STATES_GEOJSON, {
    style: { color:'#B7BDC7', weight:1, fillOpacity:0, opacity:0.9 },
    interactive: false
  }).addTo(map);
  const stateLabels = L.layerGroup();
  STATES_GEOJSON.features.forEach(f=>{
    const c = featureCentroid(f);
    L.marker([c[1], c[0]], {
      icon: L.divIcon({ className:'', html:`<div class="state-label">${f.properties.name}</div>`, iconSize:[100,12] }),
      interactive:false, keyboard:false, pane:'labelPane'
    }).addTo(stateLabels);
  });
  function updateLabelVisibility(){
    const z = map.getZoom();
    if(z >= 4){ if(!map.hasLayer(stateLabels)) stateLabels.addTo(map); }
    else { if(map.hasLayer(stateLabels)) map.removeLayer(stateLabels); }
  }
  map.on('zoomend', updateLabelVisibility);
  updateLabelVisibility();

  // --- Country + city name labels from CARTO, rendered above markers ---
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19, pane: 'topLabelsPane'
  }).addTo(map);

  const CONTINENTS = [
    { name: 'North America', lat: 48, lon: -100 },
    { name: 'South America', lat: -16, lon: -60 },
    { name: 'Europe', lat: 51, lon: 20 },
    { name: 'Africa', lat: 4, lon: 20 },
    { name: 'Asia', lat: 42, lon: 92 },
    { name: 'Oceania', lat: -24, lon: 138 }
  ];
  CONTINENTS.forEach(c => {
    L.marker([c.lat, c.lon], {
      icon: L.divIcon({ className: '', html: `<div class="continent-label">${c.name}</div>`, iconSize: [180, 20] }),
      interactive: false, keyboard: false, zIndexOffset: -1000
    }).addTo(map);
  });

  const cluster = L.markerClusterGroup({
    maxClusterRadius: 42,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false
  });

  function escapeHtml(s){
    if(!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  DATA.forEach(d => {
    const cls = d.precision === 'city' ? '' : (d.precision === 'state' ? 'state-precision' : 'country-precision');
    const icon = L.divIcon({ className: '', html: `<div class="marker-pin ${cls}"></div>`, iconSize:[12,12] });
    const marker = L.marker([d.jlat, d.jlon], { icon });
    const approx = d.precision !== 'city' ? `<span class="approx-tag">(${d.precision} approx.)</span>` : '';
    const tagPills = (d.role_tags||[]).map(t => `<span class="pill">${escapeHtml(t)}</span>`).join('');
    marker.bindPopup(`
      <div class="pop-name">${escapeHtml(d.name)}</div>
      <div class="pop-tags">${tagPills}</div>
      <div class="pop-loc">📍 ${escapeHtml(d.location)} ${approx}</div>
    `);
    cluster.addLayer(marker);
  });

  map.addLayer(cluster);
</script>
